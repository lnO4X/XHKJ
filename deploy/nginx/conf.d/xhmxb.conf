upstream nuxt {
    server nuxt:3000;
}

upstream strapi {
    # Replace with ECS-2 internal IP - see ENV.md
    server 172.16.0.x:1337;
}

server {
    listen 80;
    server_name xhmxb.com www.xhmxb.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name xhmxb.com www.xhmxb.com;

    # SSL
    ssl_certificate     /etc/nginx/ssl/xhmxb.com.pem;
    ssl_certificate_key /etc/nginx/ssl/xhmxb.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Strapi API proxy
    location /api/ {
        proxy_pass http://strapi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Strapi uploads
    location /uploads/ {
        proxy_pass http://strapi;
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Strapi Admin (restrict to office IP)
    location /admin {
        # allow <办公网络IP>;
        # deny all;
        proxy_pass http://strapi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nuxt SSR (fallback)
    location / {
        proxy_pass http://nuxt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static assets long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        proxy_pass http://nuxt;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
