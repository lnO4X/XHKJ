version: "3.8"
services:
  strapi:
    build: ../xinghui-cms
    env_file: .env.ecs2
    volumes:
      - uploads:/app/public/uploads
    ports:
      - "1337:1337"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    env_file: .env.ecs2
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-xinghui_cms}
      POSTGRES_USER: ${DATABASE_USERNAME:-xinghui}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xinghui -d xinghui_cms"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

volumes:
  pgdata:
  redisdata:
  uploads:
