version: "3.8"
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - nuxt
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nuxt:
    build: ../xinghui-web
    env_file: .env.ecs1
    expose:
      - "3000"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
